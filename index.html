<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Control - Retail Lease Management</title>
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/index.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .drag-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        #login-overlay { transition: opacity 0.5s ease-in-out, visibility 0.5s; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Configuration & Constants ---
        const STAGES = [
            { id: 'prospect', label: 'Prospecting', color: 'border-blue-500' },
            { id: 'loi', label: 'LOI / Offer', color: 'border-yellow-500' },
            { id: 'dd', label: 'Due Diligence', color: 'border-orange-500' },
            { id: 'closing', label: 'Closing', color: 'border-purple-500' },
            { id: 'development', label: 'Development', color: 'border-teal-500' },
            { id: 'leased', label: 'Active Lease', color: 'border-emerald-500' },
            { id: 'sold', label: 'Properties Sold', color: 'border-slate-500' }
        ];

        const DD_STAGES = [
            { id: 'not_started', label: 'Not Started', color: 'border-slate-400' },
            { id: 'in_progress', label: 'In Progress', color: 'border-blue-500' },
            { id: 'completed', label: 'Completed', color: 'border-emerald-500' }
        ];

        const DEV_STAGES = [
            { id: 'not_started', label: 'Not Started', color: 'border-slate-400' },
            { id: 'in_progress', label: 'In Progress', color: 'border-amber-500' },
            { id: 'completed', label: 'Completed', color: 'border-emerald-500' }
        ];

        const LIBRARY_CATEGORIES = [
            'Corporate Documents & Accounts', 'Correspondence', 'Website Information',
            'Legal Templates', 'Insurance Records', 'Marketing Materials',
            'Standard Operating Procedures', 'Other'
        ];

        // --- Icons Helper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name] || lucide.HelpCircle;
            return <LucideIcon size={size} className={className} />;
        };
// --- UI Components ---

        const Sidebar = ({ currentView, onViewChange, isOpen, onToggle }) => {
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
                { id: 'pipeline', label: 'Deal Pipeline', icon: 'MapPin' },
                { id: 'duediligence', label: 'Due Diligence', icon: 'ListChecks' },
                { id: 'development', label: 'Development', icon: 'HardHat' },
                { id: 'franchises', label: 'Franchise Criteria', icon: 'Store' },
                { id: 'tasks', label: 'Tasks & Dates', icon: 'Calendar' },
                { id: 'contacts', label: 'Contact Book', icon: 'Users' },
                { id: 'library', label: 'Library', icon: 'Library' },
                { id: 'calculator', label: 'Rent Calculator', icon: 'Calculator' },
            ];

            return (
                <div id="sidebar" className={`fixed inset-y-0 left-0 transform transition-transform duration-300 ease-in-out w-64 bg-slate-900 text-white flex flex-col shrink-0 z-50 shadow-xl md:relative md:translate-x-0 ${!isOpen ? "-translate-x-full" : "translate-x-0"}`}>
                    <div className="p-6 border-b border-slate-700 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <Icon name="Building" className="text-emerald-400" size={24} />
                                Ground<span className="text-emerald-400">Control</span>
                            </h1>
                            <p className="text-xs text-slate-400 mt-2">Retail Lease Management</p>
                        </div>
                        <button onClick={onToggle} className="md:hidden p-2 text-slate-400 hover:bg-slate-800 rounded-lg">
                            <Icon name="Menu" size={20} />
                        </button>
                    </div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                        {navItems.map((item) => (
                            <button
                                key={item.id}
                                onClick={() => {
                                    onViewChange(item.id);
                                    if (window.innerWidth < 768) onToggle();
                                }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${currentView === item.id ? "bg-emerald-600 text-white shadow-md" : "text-slate-300 hover:bg-slate-800"}`}
                            >
                                <Icon name={item.icon} size={20} />
                                <span className="font-medium">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                    <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">v2.44.0</div>
                </div>
            );
        };

        const Header = ({ onToggleSidebar, onLogout }) => (
            <header className="bg-white/80 backdrop-blur-lg z-40 shadow-sm border-b border-slate-200 shrink-0">
                <div className="container mx-auto px-4 py-3">
                    <div className="flex items-center justify-between gap-2">
                        <div className="font-extrabold text-lg md:text-2xl text-slate-900 truncate">Ground Lease Group</div>
                        <div className="flex items-center gap-2">
                            <button onClick={onToggleSidebar} className="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg border border-slate-200">
                                <Icon name="Menu" size={20} />
                            </button>
                            <button onClick={onLogout} className="bg-amber-500 text-white font-bold py-2 px-3 rounded-lg hover:bg-amber-600 transition-colors text-xs md:text-sm whitespace-nowrap">Logout</button>
                        </div>
                    </div>
                </div>
            </header>
        );

        const StatCard = ({ label, value, subtext, colorClass = "text-slate-800", labelColorClass = "text-slate-500" }) => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div className={`text-xs font-bold uppercase tracking-wider mb-1 ${labelColorClass}`}>{label}</div>
                <div className={`text-2xl font-bold ${colorClass}`}>{value}</div>
                {subtext && <div className="text-[10px] text-slate-400">{subtext}</div>}
            </div>
        );

        const Dashboard = ({ deals, tasks, libraryItems, onViewTasks, onEditTask, onViewLibrary }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const stats = useMemo(() => {
                const totalProps = deals.length;
                const activeLeases = deals.filter(d => d.stage === 'leased').length;
                const soldProps = deals.filter(d => d.stage === 'sold').length;
                const pendingTasks = tasks.filter(t => !t.completed).length;
                return { totalProps, activeLeases, soldProps, pendingTasks };
            }, [deals, tasks]);

            const upcomingTasks = useMemo(() => {
                return tasks
                    .filter(t => !t.completed)
                    .sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime())
                    .slice(0, 5);
            }, [tasks]);

            const recentDocs = useMemo(() => {
                return [...libraryItems]
                    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))
                    .slice(0, 5);
            }, [libraryItems]);

            const financialData = useMemo(() => {
                let totalEstMarketValue = 0;
                let totalEstProfit = 0;
                let totalRealizedProfit = 0;
                const annualData = {};

                deals.forEach(deal => {
                    const purchasePrice = parseFloat(deal.value?.toString().replace(/[^0-9.-]+/g, "") || "0");
                    const salePrice = parseFloat(deal.salePrice?.toString().replace(/[^0-9.-]+/g, "") || "0");
                    
                    if (deal.stage === 'sold') {
                        const profit = salePrice - purchasePrice;
                        totalRealizedProfit += profit;
                        const year = deal.saleDate ? new Date(deal.saleDate).getFullYear() : new Date().getFullYear();
                        if (!annualData[year]) annualData[year] = { realized: 0, potential: 0 };
                        annualData[year].realized += profit;
                    } else {
                        const marketValue = purchasePrice * 1.2;
                        totalEstMarketValue += marketValue;
                        const profit = marketValue - purchasePrice;
                        totalEstProfit += profit;
                        const year = new Date().getFullYear();
                        if (!annualData[year]) annualData[year] = { realized: 0, potential: 0 };
                        annualData[year].potential += profit;
                    }
                });
                return { totalEstMarketValue, totalEstProfit, totalRealizedProfit, annualData };
            }, [deals]);

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(financialData.annualData),
                            datasets: [
                                {
                                    label: 'Realized Profit',
                                    data: Object.values(financialData.annualData).map(d => d.realized),
                                    backgroundColor: '#2563eb',
                                    borderRadius: 4,
                                },
                                {
                                    label: 'Potential Profit',
                                    data: Object.values(financialData.annualData).map(d => d.potential),
                                    backgroundColor: '#10b981',
                                    borderRadius: 4,
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom' } },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        callback: (value) => {
                                            if (Math.abs(value) >= 1000000) return '$' + (value / 1000000).toFixed(1) + 'M';
                                            if (Math.abs(value) >= 1000) return '$' + (value / 1000).toFixed(0) + 'k';
                                            return '$' + value;
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [financialData]);

            const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);

            return (
                <div className="p-8 flex flex-col h-full overflow-y-auto">
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Dashboard</h2>
                            <p className="text-slate-500 text-sm">Welcome back. Here is your portfolio overview.</p>
                        </div>
                        <div className="text-sm text-slate-400">{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <StatCard label="Total Properties" value={stats.totalProps} />
                        <StatCard label="Active Leases" value={stats.activeLeases} colorClass="text-emerald-700" labelColorClass="text-emerald-600" />
                        <StatCard label="Properties Sold" value={stats.soldProps} />
                        <StatCard label="Pending Actions" value={stats.pendingTasks} colorClass="text-blue-700" labelColorClass="text-blue-600" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="space-y-6">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="CalendarClock" className="text-blue-500" size={18} /> Upcoming Schedule</h3>
                                    <button onClick={onViewTasks} className="text-xs text-blue-600 hover:underline">View All</button>
                                </div>
                                <div className="space-y-3">
                                    {upcomingTasks.length === 0 ? <div className="text-slate-400 text-sm italic">No upcoming tasks.</div> : upcomingTasks.map(task => (
                                        <div key={task.id} onClick={() => onEditTask(task.id)} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded border border-transparent hover:border-slate-100 transition cursor-pointer">
                                            <div className="bg-blue-100 text-blue-600 rounded p-1.5 shrink-0"><Icon name="Calendar" size={16} /></div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-sm font-medium text-slate-800 truncate">{task.title}</div>
                                                <div className="text-xs text-slate-500">{task.date}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="FileText" className="text-emerald-500" size={18} /> Recent Documents</h3>
                                    <button onClick={onViewLibrary} className="text-xs text-emerald-600 hover:underline">Library</button>
                                </div>
                                <div className="space-y-3">
                                    {recentDocs.length === 0 ? <div className="text-slate-400 text-sm italic">No documents in library.</div> : recentDocs.map(doc => (
                                        <a key={doc.id} href={doc.url} target="_blank" rel="noreferrer" className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded border border-transparent hover:border-slate-100 transition cursor-pointer">
                                            <div className="bg-emerald-100 text-emerald-600 rounded p-1.5 shrink-0"><Icon name="Link" size={16} /></div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-sm font-medium text-slate-800 truncate">{doc.name}</div>
                                                <div className="text-[10px] text-slate-400 uppercase font-bold">{doc.category}</div>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-2 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <StatCard label="Est. Market Value" value={formatCurrency(financialData.totalEstMarketValue)} subtext="Current Portfolio" />
                                <StatCard label="Potential Profit" value={formatCurrency(financialData.totalEstProfit)} subtext="Unrealized" colorClass="text-emerald-600" labelColorClass="text-emerald-600" />
                                <StatCard label="Realized Profit" value={formatCurrency(financialData.totalRealizedProfit)} subtext="Closed & Sold" colorClass="text-blue-600" labelColorClass="text-blue-600" />
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4"><Icon name="BarChart3" className="text-indigo-500" size={18} /> Financial Performance (Annual)</h3>
                                <div className="h-64 w-full"><canvas ref={chartRef}></canvas></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
// --- Management Modules ---

        const DealCard = ({ deal, franchise, onClick, onDelete, onMove }) => {
            const formattedValue = useMemo(() => {
                const val = parseFloat(deal.value?.toString().replace(/[^0-9.-]+/g, "") || "0");
                return val.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
            }, [deal.value]);

            return (
                <div onClick={onClick} className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition group relative drag-card cursor-pointer">
                    <div className="flex justify-between items-start mb-2 pr-6">
                        <div className="flex items-center">
                            {franchise?.logoUrl ? (
                                <img src={franchise.logoUrl} className="w-8 h-8 rounded-full object-contain border border-slate-200 bg-white shrink-0 mr-2" alt={franchise.name} />
                            ) : (
                                <div className="w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-bold text-xs shrink-0 mr-2">
                                    <Icon name="Store" size={14} />
                                </div>
                            )}
                            <h4 className="font-bold text-slate-800 leading-tight truncate max-w-[150px]">{franchise?.name || deal.name}</h4>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="text-slate-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition absolute top-2 right-2">
                            <Icon name="Trash2" size={14} />
                        </button>
                    </div>
                    <p className="text-xs text-slate-500 flex items-center gap-1 mb-3 truncate">
                        <Icon name="MapPin" size={12} /> {deal.address || 'No Address'}
                    </p>
                    <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100">
                        <span className="text-xs font-mono font-medium text-emerald-600">{formattedValue}</span>
                        <select
                            onClick={(e) => e.stopPropagation()}
                            onChange={(e) => onMove(e.target.value)}
                            value={deal.stage}
                            className="text-[10px] bg-slate-100 border-none rounded px-2 py-1 cursor-pointer hover:bg-slate-200 focus:ring-0 font-bold text-slate-600"
                        >
                            {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                    </div>
                </div>
            );
        };

        const Pipeline = ({ deals, franchises, onNewDeal, onOpenDetail, onDeleteDeal, onMoveStage }) => (
            <div className="p-8 flex flex-col h-full overflow-hidden">
                <div className="flex justify-between items-center mb-6 shrink-0">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Deal Pipeline</h2>
                        <p className="text-slate-500 text-sm">Track retail site acquisitions from lead to sale.</p>
                    </div>
                    <button onClick={onNewDeal} className="bg-slate-900 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-700 transition shadow-lg">
                        <Icon name="Plus" size={18} /> New Deal
                    </button>
                </div>
                <div className="flex-1 overflow-x-auto overflow-y-hidden pb-4">
                    <div className="flex gap-6 min-w-max h-full">
                        {STAGES.map(stage => (
                            <div key={stage.id} className="w-80 flex flex-col h-full shrink-0">
                                <div className={`flex items-center gap-2 mb-3 pb-2 border-b-2 font-semibold text-slate-700 ${stage.color}`}>
                                    <span className="flex-1">{stage.label}</span>
                                    <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full text-xs font-bold">
                                        {deals.filter(d => d.stage === stage.id).length}
                                    </span>
                                </div>
                                <div className="flex-1 bg-slate-200/50 rounded-lg p-2 space-y-3 overflow-y-auto no-scrollbar">
                                    {deals.filter(d => d.stage === stage.id).map(deal => (
                                        <DealCard key={deal.id} deal={deal} franchise={franchises.find(f => f.id === deal.franchiseId)} onClick={() => onOpenDetail(deal.id)} onDelete={() => onDeleteDeal(deal.id)} onMove={(s) => onMoveStage(deal.id, s)} />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const DDCard = ({ deal, franchise, onClick, onMove }) => {
            const progress = useMemo(() => {
                const total = deal.checklist?.length || 0;
                const completed = deal.checklist?.filter(t => t.completed).length || 0;
                return total > 0 ? Math.round((completed / total) * 100) : 0;
            }, [deal.checklist]);

            return (
                <div onClick={onClick} className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition group cursor-pointer relative drag-card">
                    <div className="flex items-center mb-1 pr-6">
                        {franchise?.logoUrl ? (
                            <img src={franchise.logoUrl} className="w-6 h-6 rounded-full object-contain border border-slate-200 bg-white shrink-0 mr-2" alt={franchise.name} />
                        ) : (
                            <div className="w-6 h-6 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-bold text-[10px] shrink-0 mr-2"><Icon name="Store" size={12} /></div>
                        )}
                        <h4 className="font-bold text-slate-800 leading-tight truncate">{franchise?.name || deal.name}</h4>
                    </div>
                    <p className="text-[10px] text-slate-500 mb-3 truncate"><Icon name="MapPin" size={10} className="inline mr-1" /> {deal.address || 'No Address'}</p>
                    <div className="mb-3">
                        <div className="flex justify-between text-[10px] text-slate-500 mb-1 font-medium">
                            <span>{deal.checklist?.filter(t => t.completed).length || 0}/{deal.checklist?.length || 0} Tasks</span>
                            <span>{progress}%</span>
                        </div>
                        <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div className="bg-emerald-500 h-1.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100">
                        <span className="text-[9px] text-slate-400 uppercase tracking-wider font-bold">DD Status</span>
                        <select onClick={(e) => e.stopPropagation()} onChange={(e) => onMove(e.target.value)} value={deal.ddStatus || 'not_started'} className="text-[10px] bg-slate-100 border-none rounded px-2 py-1 cursor-pointer hover:bg-slate-200 focus:ring-0 font-bold text-slate-700">
                            {DD_STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                    </div>
                </div>
            );
        };

        const DueDiligence = ({ deals, franchises, onOpenDetail, onMoveStage }) => (
            <div className="p-8 flex flex-col h-full overflow-hidden">
                <div className="flex justify-between items-center mb-6 shrink-0">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Due Diligence Tracking</h2>
                        <p className="text-slate-500 text-sm">Manage environmental, survey, and title action items.</p>
                    </div>
                </div>
                <div className="flex-1 overflow-x-auto overflow-y-hidden pb-4">
                    <div className="flex gap-6 min-w-max h-full">
                        {DD_STAGES.map(stage => (
                            <div key={stage.id} className="w-80 flex flex-col h-full shrink-0">
                                <div className={`flex items-center gap-2 mb-3 pb-2 border-b-2 font-semibold text-slate-700 ${stage.color}`}>
                                    <span className="flex-1">{stage.label}</span>
                                    <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full text-xs font-bold">{deals.filter(d => (d.ddStatus || 'not_started') === stage.id).length}</span>
                                </div>
                                <div className="flex-1 bg-slate-200/50 rounded-lg p-2 space-y-3 overflow-y-auto no-scrollbar">
                                    {deals.filter(d => (d.ddStatus || 'not_started') === stage.id).map(deal => (
                                        <DDCard key={deal.id} deal={deal} franchise={franchises.find(f => f.id === deal.franchiseId)} onClick={() => onOpenDetail(deal.id)} onMove={(s) => onMoveStage(deal.id, s)} />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const DevCard = ({ deal, franchise, onClick, onMove }) => {
            const progress = useMemo(() => {
                const total = deal.devChecklist?.length || 0;
                const completed = deal.devChecklist?.filter(t => t.completed).length || 0;
                return total > 0 ? Math.round((completed / total) * 100) : 0;
            }, [deal.devChecklist]);

            return (
                <div onClick={onClick} className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition group cursor-pointer relative drag-card">
                    <div className="flex items-center mb-1 pr-6">
                        {franchise?.logoUrl ? (
                            <img src={franchise.logoUrl} className="w-6 h-6 rounded-full object-contain border border-slate-200 bg-white shrink-0 mr-2" alt={franchise.name} />
                        ) : (
                            <div className="w-6 h-6 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-bold text-[10px] shrink-0 mr-2"><Icon name="Store" size={12} /></div>
                        )}
                        <h4 className="font-bold text-slate-800 leading-tight truncate">{franchise?.name || deal.name}</h4>
                    </div>
                    <p className="text-[10px] text-slate-500 mb-3 truncate"><Icon name="MapPin" size={10} className="inline mr-1" /> {deal.address || 'No Address'}</p>
                    <div className="mb-3">
                        <div className="flex justify-between text-[10px] text-slate-500 mb-1 font-medium">
                            <span>{deal.devChecklist?.filter(t => t.completed).length || 0}/{deal.devChecklist?.length || 0} Tasks</span>
                            <span>{progress}%</span>
                        </div>
                        <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div className="bg-amber-500 h-1.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100">
                        <span className="text-[9px] text-slate-400 uppercase tracking-wider font-bold">Dev Status</span>
                        <select onClick={(e) => e.stopPropagation()} onChange={(e) => onMove(e.target.value)} value={deal.devStatus || 'not_started'} className="text-[10px] bg-slate-100 border-none rounded px-2 py-1 cursor-pointer hover:bg-slate-200 focus:ring-0 font-bold text-slate-700">
                            {DEV_STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                    </div>
                </div>
            );
        };

        const Development = ({ deals, franchises, onOpenDetail, onMoveStage }) => (
            <div className="p-8 flex flex-col h-full overflow-hidden">
                <div className="flex justify-between items-center mb-6 shrink-0">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Site Development</h2>
                        <p className="text-slate-500 text-sm">Manage construction and "pad ready" tasks per deal.</p>
                    </div>
                </div>
                <div className="flex-1 overflow-x-auto overflow-y-hidden pb-4">
                    <div className="flex gap-6 min-w-max h-full">
                        {DEV_STAGES.map(stage => (
                            <div key={stage.id} className="w-80 flex flex-col h-full shrink-0">
                                <div className={`flex items-center gap-2 mb-3 pb-2 border-b-2 font-semibold text-slate-700 ${stage.color}`}>
                                    <span className="flex-1">{stage.label}</span>
                                    <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full text-xs font-bold">{deals.filter(d => (d.devStatus || 'not_started') === stage.id).length}</span>
                                </div>
                                <div className="flex-1 bg-slate-200/50 rounded-lg p-2 space-y-3 overflow-y-auto no-scrollbar">
                                    {deals.filter(d => (d.devStatus || 'not_started') === stage.id).map(deal => (
                                        <DevCard key={deal.id} deal={deal} franchise={franchises.find(f => f.id === deal.franchiseId)} onClick={() => onOpenDetail(deal.id)} onMove={(s) => onMoveStage(deal.id, s)} />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const LibraryCard = ({ item, onClick, onDelete }) => (
            <div onClick={onClick} className="bg-white p-5 rounded-lg border border-slate-200 shadow-sm hover:shadow-md transition relative group cursor-pointer flex flex-col h-full">
                <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                    <Icon name="Trash2" size={16} />
                </button>
                <div className="flex items-start gap-3 mb-3">
                    <div className="w-10 h-10 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0"><Icon name="FileText" size={20} /></div>
                    <div className="min-w-0 pr-6">
                        <h4 className="font-bold text-slate-800 truncate" title={item.name}>{item.name}</h4>
                        <p className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">{item.category}</p>
                    </div>
                </div>
                {item.notes && <p className="text-xs text-slate-500 mb-4 line-clamp-2 italic">"{item.notes}"</p>}
                <div className="mt-auto pt-3 border-t border-slate-100">
                    <a href={item.url} target="_blank" rel="noreferrer" onClick={(e) => e.stopPropagation()} className="flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium transition">
                        <Icon name="Link" size={14} /> <span className="truncate">View in Drive</span> <Icon name="ExternalLink" size={12} className="shrink-0" />
                    </a>
                </div>
            </div>
        );

        const Library = ({ items, onNewItem, onEditItem, onDeleteItem }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const filteredItems = items.filter(item => item.name.toLowerCase().includes(searchQuery.toLowerCase()) || item.category.toLowerCase().includes(searchQuery.toLowerCase()));
            const groupedItems = LIBRARY_CATEGORIES.reduce((acc, category) => {
                acc[category] = filteredItems.filter(item => item.category === category);
                return acc;
            }, {});

            return (
                <div className="p-8 flex flex-col h-full overflow-hidden">
                    <div className="flex justify-between items-center mb-6 shrink-0 gap-4">
                        <div><h2 className="text-2xl font-bold text-slate-800">Library</h2><p className="text-slate-500 text-sm">Central repository for corporate documents.</p></div>
                        <div className="flex-1 max-w-md mx-auto">
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><Icon name="Search" size={16} /></div>
                                <input type="text" placeholder="Search library..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm" />
                            </div>
                        </div>
                        <button onClick={onNewItem} className="bg-slate-900 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-700 transition shadow-lg"><Icon name="Plus" size={18} /> Add File</button>
                    </div>
                    <div className="overflow-y-auto pb-4 space-y-8">
                        {filteredItems.length === 0 ? <div className="col-span-full text-center py-12 text-slate-400">No files found.</div> : LIBRARY_CATEGORIES.map(category => groupedItems[category]?.length > 0 && (
                            <div key={category}>
                                <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2 px-1"><Icon name="Folder" size={16} className="text-slate-400" /> {category} ({groupedItems[category].length})</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                    {groupedItems[category].map(item => <LibraryCard key={item.id} item={item} onClick={() => onEditItem(item.id)} onDelete={() => onDeleteItem(item.id)} />)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
// --- Utility & Modals ---

        const Calculator = ({ deals, franchises, selectedDealId, onSelectDeal, onUpdateParams }) => {
            const deal = deals.find(d => d.id === selectedDealId);
            const [params, setParams] = useState({
                rentPerSqFt: 25,
                sqFt: 2500,
                capRate: 6.5,
                annualIncrease: 2,
                leaseTerm: 10
            });

            useEffect(() => {
                if (deal?.calcParams) setParams(deal.calcParams);
            }, [deal]);

            const results = useMemo(() => {
                const annualRent = params.rentPerSqFt * params.sqFt;
                const valuation = annualRent / (params.capRate / 100);
                return { annualRent, valuation };
            }, [params]);

            return (
                <div className="p-8 flex flex-col h-full overflow-y-auto">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Rent & Valuation Calculator</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
                            <h3 className="font-bold text-slate-700 mb-4">Input Parameters</h3>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Select Deal</label>
                                <select value={selectedDealId || ''} onChange={(e) => onSelectDeal(e.target.value)} className="w-full p-2 border rounded-lg bg-slate-50">
                                    <option value="">-- Select a Deal --</option>
                                    {deals.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                </select>
                            </div>
                            {['rentPerSqFt', 'sqFt', 'capRate', 'annualIncrease', 'leaseTerm'].map(key => (
                                <div key={key}>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">{key.replace(/([A-Z])/g, ' $1')}</label>
                                    <input type="number" value={params[key]} onChange={(e) => setParams({...params, [key]: parseFloat(e.target.value)})} className="w-full p-2 border rounded-lg" />
                                </div>
                            ))}
                            <button onClick={() => onUpdateParams(selectedDealId, params, results.valuation)} className="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700 transition">Save to Deal</button>
                        </div>
                        <div className="lg:col-span-2 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-emerald-600 text-white p-8 rounded-xl shadow-lg">
                                    <div className="text-sm font-bold uppercase opacity-80 mb-2">Estimated Annual Rent</div>
                                    <div className="text-4xl font-black">${results.annualRent.toLocaleString()}</div>
                                </div>
                                <div className="bg-blue-600 text-white p-8 rounded-xl shadow-lg">
                                    <div className="text-sm font-bold uppercase opacity-80 mb-2">Estimated Asset Value</div>
                                    <div className="text-4xl font-black">${results.valuation.toLocaleString()}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Controller ---

        const App = () => {
            const [user, setUser] = useState({ uid: 'guest', email: 'guest@example.com' }); // Mocked for single-file demo
            const [currentView, setCurrentView] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // Mock Data (In the real app, this syncs with Firebase)
            const [deals, setDeals] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [libraryItems, setLibraryItems] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [franchises, setFranchises] = useState([]);

            const [activeModal, setActiveModal] = useState(null);
            const [selectedDealId, setSelectedDealId] = useState(null);

            const handleLogout = () => alert("Logout simulated.");

            return (
                <div className="bg-slate-100 text-slate-900 h-screen flex flex-col overflow-hidden">
                    <Header onToggleSidebar={() => setIsSidebarOpen(!isSidebarOpen)} onLogout={handleLogout} />
                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden relative">
                        <Sidebar currentView={currentView} onViewChange={setCurrentView} isOpen={isSidebarOpen} onToggle={() => setIsSidebarOpen(!isSidebarOpen)} />
                        <main className="flex-1 relative bg-slate-100 overflow-hidden">
                            {currentView === 'dashboard' && <Dashboard deals={deals} tasks={tasks} libraryItems={libraryItems} onViewTasks={() => setCurrentView('tasks')} onEditTask={(id) => { setSelectedDealId(id); setActiveModal('task'); }} onViewLibrary={() => setCurrentView('library')} />}
                            {currentView === 'pipeline' && <Pipeline deals={deals} franchises={franchises} onNewDeal={() => setActiveModal('deal')} onOpenDetail={(id) => { setSelectedDealId(id); setActiveModal('deal-detail'); }} onDeleteDeal={(id) => setDeals(deals.filter(d => d.id !== id))} onMoveStage={(id, s) => setDeals(deals.map(d => d.id === id ? {...d, stage: s} : d))} />}
                            {currentView === 'duediligence' && <DueDiligence deals={deals} franchises={franchises} onOpenDetail={(id) => { setSelectedDealId(id); setActiveModal('checklist'); }} onMoveStage={(id, s) => setDeals(deals.map(d => d.id === id ? {...d, ddStatus: s} : d))} />}
                            {currentView === 'development' && <Development deals={deals} franchises={franchises} onOpenDetail={(id) => { setSelectedDealId(id); setActiveModal('checklist'); }} onMoveStage={(id, s) => setDeals(deals.map(d => d.id === id ? {...d, devStatus: s} : d))} />}
                            {currentView === 'library' && <Library items={libraryItems} onNewItem={() => setActiveModal('library')} onEditItem={(id) => { setSelectedDealId(id); setActiveModal('library'); }} onDeleteItem={(id) => setLibraryItems(libraryItems.filter(i => i.id !== id))} />}
                            {currentView === 'calculator' && <Calculator deals={deals} franchises={franchises} selectedDealId={selectedDealId} onSelectDeal={setSelectedDealId} onUpdateParams={(id, p, v) => setDeals(deals.map(d => d.id === id ? {...d, calcParams: p, value: v} : d))} />}
                        </main>
                    </div>
                    
                    {/* Placeholder for Modals - In the full app, these are detailed forms */}
                    {activeModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-xl p-8 max-w-md w-full shadow-2xl">
                                <h2 className="text-xl font-bold mb-4">Modal: {activeModal}</h2>
                                <p className="text-slate-500 mb-6">This is a simplified version of the {activeModal} form for the single-file preview.</p>
                                <button onClick={() => setActiveModal(null)} className="w-full bg-slate-900 text-white py-2 rounded-lg font-bold">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
