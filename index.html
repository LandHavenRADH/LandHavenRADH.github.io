<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Control - Retail Lease Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .drag-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Constants ---
        const STAGES = [
            { id: 'prospect', label: 'Prospecting', color: 'border-blue-500' },
            { id: 'loi', label: 'LOI / Offer', color: 'border-yellow-500' },
            { id: 'dd', label: 'Due Diligence', color: 'border-orange-500' },
            { id: 'closing', label: 'Closing', color: 'border-purple-500' },
            { id: 'development', label: 'Development', color: 'border-teal-500' },
            { id: 'leased', label: 'Active Lease', color: 'border-emerald-500' },
            { id: 'sold', label: 'Properties Sold', color: 'border-slate-500' }
        ];

        const LIBRARY_CATEGORIES = ['Corporate Documents & Accounts', 'Correspondence', 'Website Information', 'Legal Templates', 'Other'];

        // --- Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name] || lucide.HelpCircle;
            return <LucideIcon size={size} className={className} />;
        };

        const Sidebar = ({ currentView, onViewChange, isOpen, onToggle }) => (
            <div className={`fixed inset-y-0 left-0 transform transition-transform duration-300 w-64 bg-slate-900 text-white flex flex-col z-50 md:relative md:translate-x-0 ${!isOpen ? "-translate-x-full" : "translate-x-0"}`}>
                <div className="p-6 border-b border-slate-700 flex justify-between items-center">
                    <h1 className="text-xl font-bold flex items-center gap-2">
                        <Icon name="Building" className="text-emerald-400" /> Ground<span className="text-emerald-400">Control</span>
                    </h1>
                    <button onClick={onToggle} className="md:hidden"><Icon name="X" /></button>
                </div>
                <nav className="flex-1 p-4 space-y-1">
                    {[
                        { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
                        { id: 'pipeline', label: 'Deal Pipeline', icon: 'MapPin' },
                        { id: 'duediligence', label: 'Due Diligence', icon: 'ListChecks' },
                        { id: 'development', label: 'Development', icon: 'HardHat' },
                        { id: 'library', label: 'Library', icon: 'Library' },
                        { id: 'calculator', label: 'Rent Calculator', icon: 'Calculator' }
                    ].map(item => (
                        <button key={item.id} onClick={() => onViewChange(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${currentView === item.id ? "bg-emerald-600" : "hover:bg-slate-800 text-slate-400"}`}>
                            <Icon name={item.icon} size={18} /> <span className="font-medium">{item.label}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );

        const Dashboard = ({ deals, libraryItems }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['2023', '2024', '2025'],
                        datasets: [{ label: 'Profit', data: [12, 19, 30], backgroundColor: '#10b981' }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }, []);

            return (
                <div className="p-8 space-y-8 overflow-y-auto h-full">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <p className="text-xs font-bold text-slate-400 uppercase">Total Deals</p>
                            <p className="text-3xl font-bold text-slate-800">{deals.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <p className="text-xs font-bold text-slate-400 uppercase">Library Files</p>
                            <p className="text-3xl font-bold text-slate-800">{libraryItems.length}</p>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-64">
                        <canvas ref={canvasRef}></canvas>
                    </div>
                </div>
            );
        };

        const Library = ({ items, onAdd }) => (
            <div className="p-8 h-full flex flex-col">
                <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold">Library</h2>
                    <button onClick={onAdd} className="bg-slate-900 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                        <Icon name="Plus" size={18} /> Add File
                    </button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 overflow-y-auto">
                    {items.map(item => (
                        <div key={item.id} className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-3 mb-2">
                                <Icon name="FileText" className="text-emerald-500" />
                                <h4 className="font-bold truncate">{item.name}</h4>
                            </div>
                            <p className="text-xs text-slate-400 mb-4">{item.category}</p>
                            <a href={item.url} target="_blank" className="text-emerald-600 text-sm font-medium flex items-center gap-1">
                                <Icon name="ExternalLink" size={14} /> View in Drive
                            </a>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- Main App ---
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [deals, setDeals] = useState(() => JSON.parse(localStorage.getItem('gc_deals') || '[]'));
            const [libraryItems, setLibraryItems] = useState(() => JSON.parse(localStorage.getItem('gc_library') || '[]'));

            useEffect(() => {
                localStorage.setItem('gc_deals', JSON.stringify(deals));
                localStorage.setItem('gc_library', JSON.stringify(libraryItems));
            }, [deals, libraryItems]);

            const handleAddFile = () => {
                const name = prompt("File Name:");
                const url = prompt("Google Drive URL:");
                if (name && url) {
                    setLibraryItems([...libraryItems, { id: Date.now(), name, url, category: 'Other' }]);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <Sidebar currentView={currentView} onViewChange={setCurrentView} isOpen={isSidebarOpen} onToggle={() => setIsSidebarOpen(!isSidebarOpen)} />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="bg-white border-b p-4 flex justify-between items-center">
                            <button onClick={() => setIsSidebarOpen(true)} className="md:hidden"><Icon name="Menu" /></button>
                            <h2 className="font-bold text-slate-800">Ground Lease Group</h2>
                            <div className="w-8 h-8 bg-slate-200 rounded-full"></div>
                        </header>
                        <main className="flex-1 overflow-hidden">
                            {currentView === 'dashboard' && <Dashboard deals={deals} libraryItems={libraryItems} />}
                            {currentView === 'library' && <Library items={libraryItems} onAdd={handleAddFile} />}
                            {['pipeline', 'duediligence', 'development', 'calculator'].includes(currentView) && (
                                <div className="p-20 text-center text-slate-400">
                                    <Icon name="Construction" size={48} className="mx-auto mb-4" />
                                    <h3 className="text-xl font-bold">Module Under Construction</h3>
                                    <p>This view is being optimized for the single-file version.</p>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
