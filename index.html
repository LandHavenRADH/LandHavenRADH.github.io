<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ground Control | Ground Lease Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #login-overlay { transition: opacity .4s ease, visibility .4s ease; }
    #login-overlay.hidden-overlay { opacity: 0; visibility: hidden; pointer-events: none; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <form id="login-form">
      <input id="login-email" type="email">
      <input id="login-password" type="password">
      <button id="btn-login" type="submit">Sign In</button>
    </form>
    <button id="btn-guest">Guest</button>
  </div>
  <button id="logout-button">Logout</button>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFvNkM8_MZ1n13EbAG3QzvTj50zZDcpqE",
    authDomain: "restaurant-groundworks-db.firebaseapp.com",
    projectId: "restaurant-groundworks-db",
    storageBucket: "restaurant-groundworks-db.firebasestorage.app",
    messagingSenderId: "391704584139",
    appId: "1:391704584139:web:bee1a86cde8411acf8a04e",
    measurementId: "G-J6FR64HDJP"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const $ = (id) => document.getElementById(id);
  const loginOverlay   = $('login-overlay');
  const loginForm      = $('login-form');
  const loginError     = null;
  const loginErrorText = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      if (loginOverlay) {
        loginOverlay.classList.add('hidden-overlay');
        setTimeout(() => loginOverlay.style.display = 'none', 400);
      }
    } else {
      if (loginOverlay) {
        loginOverlay.style.display = '';
        loginOverlay.classList.remove('hidden-overlay');
      }
    }
  });

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailInput = document.getElementById('login-email');
      const email = emailInput ? emailInput.value : '';
      const passInput  = document.getElementById('login-password');
      const pass  = passInput ? passInput.value : '';
      try { await signInWithEmailAndPassword(auth, email, pass); }
      catch (error) { console.error(error); }
    });
  }

  const btnGuest = $('btn-guest');
  if (btnGuest) btnGuest.addEventListener('click', async () => { try { await signInAnonymously(auth); } catch(e){} });
  const btnLogout = $('logout-button');
  if (btnLogout) btnLogout.addEventListener('click', () => signOut(auth).then(() => location.reload()));
  </script>
</body>
</html>
